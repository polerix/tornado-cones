<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tornado Cones - CSS Grid</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            /* display: flex; Removed to use absolute positioning */
            height: 100vh;
            font-family: sans-serif;
            perspective: 800px;
            /* High perspective for depth */
        }

        .scene {
            position: absolute;
            top: 20%;
            left: 50%;
            transform-style: preserve-3d;
            /* Tilt the entire scene to look like ground */
            transform: translateX(-50%) rotateX(60deg) scale(0.6);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 120px);
            grid-template-rows: repeat(6, 120px);
            gap: 40px;
            transform-style: preserve-3d;
        }

        .disc {
            width: 120px;
            height: 120px;
            background: #ff4444;
            /* Bright red top */
            border-radius: 50%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease, background-color 0.3s;
            cursor: pointer;

            /* 3D Thickness using box-shadow stacking */
            box-shadow:
                0 1px 0 #800000,
                0 2px 0 #800000,
                0 3px 0 #800000,
                0 4px 0 #800000,
                0 5px 0 #800000,
                0 6px 0 #800000,
                0 7px 0 #800000,
                0 8px 0 #800000,
                0 9px 0 #800000,
                0 10px 0 #800000,
                0 11px 0 #800000,
                0 12px 0 #800000,
                0 13px 0 #800000,
                0 14px 0 #800000,
                0 30px 20px rgba(0, 0, 0, 0.6);
            /* Drop shadow on floor */
        }

        /* Inner detail for styling */
        .disc::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40%;
            height: 40%;
            background: #cc3333;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Hover State */
        .disc:hover {
            transform: translateZ(20px);
            /* Pop up physically */
            background: #ff6666;
            box-shadow:
                0 1px 0 #a00000,
                0 2px 0 #a00000,
                0 3px 0 #a00000,
                0 4px 0 #a00000,
                0 5px 0 #a00000,
                0 6px 0 #a00000,
                0 7px 0 #a00000,
                0 8px 0 #a00000,
                0 9px 0 #a00000,
                0 10px 0 #a00000,
                0 11px 0 #a00000,
                0 12px 0 #a00000,
                0 13px 0 #a00000,
                0 14px 0 #a00000,
                0 50px 30px rgba(0, 0, 0, 0.4);
            /* Softer shadow when lifted */
        }

        /* Active / In Use State */
        .disc.active {
            background: #00ff00;
            /* Green when active */
            animation: bounce 1s infinite alternate ease-in-out;
        }

        .disc.active::after {
            background: #00cc00;
        }

        .disc.active::before {
            /* Glow */
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            right: -10%;
            bottom: -10%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.4) 0%, transparent 70%);
            transform: translateZ(-1px);
        }

        @keyframes bounce {
            0% {
                transform: translateZ(0);
            }

            100% {
                transform: translateZ(30px);
            }
        }
    </style>
</head>

<body>

    <div class="scene">
        <div class="grid" id="grid">
            <!-- Discs generated by JS -->
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const totalDiscs = 6 * 6;

        for (let i = 0; i < totalDiscs; i++) {
            const disc = document.createElement('div');
            disc.className = 'disc';

            // Interaction
            disc.onclick = () => {
                disc.classList.toggle('active');
            };

            grid.appendChild(disc);
        }

        // Random demo animation
        setInterval(() => {
            const discs = document.querySelectorAll('.disc');
            const randomDisc = discs[Math.floor(Math.random() * discs.length)];

            // Briefly activate
            randomDisc.classList.add('active');
            setTimeout(() => {
                randomDisc.classList.remove('active');
            }, 2000);
        }, 1000);
    </script>

</body>

</html>
